<script>
  const card = document.getElementById('login-card');
  const bgCanvas = document.getElementById('bg-canvas');
  const bgCtx = bgCanvas.getContext('2d');
  const logoCanvas = document.getElementById('logo-canvas');
  const logoCtx = logoCanvas.getContext('2d', { willReadFrequently: true });

  let mouse = { x: -1000, y: -1000, radius: 120 };
  let bgParticles = [];
  let logoParticles = [];
  let width, height;

  class Particle {
    constructor(x, y, isStatic = false) {
      this.x = x;
      this.y = y;
      this.baseX = x;
      this.baseY = y;
      this.size = isStatic ? Math.random() * 1.5 + 0.8 : Math.random() * 1.5 + 0.5;
      this.vx = 0;
      this.vy = 0;
      this.friction = isStatic ? 0.88 : 0.95;
      this.isStatic = isStatic;
      
      if (isStatic) {
        const rand = Math.random();
        this.color = rand > 0.7 ? 'rgba(0, 242, 255, 1)' : 'rgba(255, 255, 255, 1)';
      } else {
        this.color = `rgba(255,255,255,${Math.random() * 0.2 + 0.05})`;
      }
      
      this.ease = isStatic ? 0.15 : 0.05;
    }

    draw(ctx) {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    update(mouseX, mouseY, forceRadius) {
      if (!this.isStatic) {
        this.x += Math.sin(Date.now() * 0.001 + this.baseX) * 0.15;
        this.y += Math.cos(Date.now() * 0.001 + this.baseY) * 0.15;
      }

      let dx = this.baseX - this.x;
      let dy = this.baseY - this.y;
      this.vx += dx * this.ease;
      this.vy += dy * this.ease;

      let mdx = this.x - mouseX;
      let mdy = this.y - mouseY;
      let mdist = Math.sqrt(mdx * mdx + mdy * mdy);
      
      if (mdist < forceRadius) {
        let force = (forceRadius - mdist) / forceRadius;
        let strength = this.isStatic ? 15 : 4;
        this.vx += (mdx / mdist) * force * strength;
        this.vy += (mdy / mdist) * force * strength;
      }

      this.vx *= this.friction;
      this.vy *= this.friction;
      this.x += this.vx;
      this.y += this.vy;
    }
  }

  function initBackground() {
    width = bgCanvas.width = window.innerWidth;
    height = bgCanvas.height = window.innerHeight;
    bgParticles = [];
    const count = Math.floor((width * height) / 5000);
    for (let i = 0; i < count; i++) {
      bgParticles.push(new Particle(Math.random() * width, Math.random() * height));
    }
  }

  function initLogo() {
    const scale = window.devicePixelRatio || 1;
    logoCanvas.width = 400 * scale;
    logoCanvas.height = 160 * scale;
    logoCtx.scale(scale, scale);

    logoCtx.fillStyle = 'white';
    logoCtx.textAlign = 'center';
    logoCtx.textBaseline = 'middle';
    
    logoCtx.font = '42px "Material Symbols Outlined"';
    logoCtx.fillText('lock_person', 200, 45);
    
    logoCtx.font = '900 52px Lexend';
    logoCtx.fillText('StegoChat', 200, 105);

    const imageData = logoCtx.getImageData(0, 0, logoCanvas.width, logoCanvas.height).data;
    logoCtx.clearRect(0, 0, logoCanvas.width, logoCanvas.height);
    logoParticles = [];

    const step = Math.floor(2 * scale);
    for (let y = 0; y < logoCanvas.height; y += step) {
      for (let x = 0; x < logoCanvas.width; x += step) {
        const index = (y * logoCanvas.width + x) * 4;
        if (imageData[index + 3] > 180) {
          logoParticles.push(new Particle(x / scale, y / scale, true));
        }
      }
    }
  }

  function animate() {
    bgCtx.clearRect(0, 0, width, height);
    logoCtx.clearRect(0, 0, logoCanvas.width, logoCanvas.height);

    bgParticles.forEach(p => {
      p.update(mouse.x, mouse.y, mouse.radius);
      p.draw(bgCtx);
    });

    const rect = logoCanvas.getBoundingClientRect();
    const logoMouseX = mouse.x - rect.left;
    const logoMouseY = mouse.y - rect.top;
    
    logoParticles.forEach(p => {
      if (p.isStatic && Math.random() > 0.98) {
        p.size = Math.random() * 2.5 + 1;
      } else if (p.isStatic) {
        p.size = p.size * 0.95 + 1 * 0.05;
      }
      p.update(logoMouseX, logoMouseY, 60);
      p.draw(logoCtx);
    });

    requestAnimationFrame(animate);
  }

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    if (card) {
      const crect = card.getBoundingClientRect();
      const cardCenterX = crect.left + crect.width / 2;
      const cardCenterY = crect.top + crect.height / 2;
      const rotateX = (e.clientY - cardCenterY) / 100;
      const rotateY = (cardCenterX - e.clientX) / 100;
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    }
  });

  window.addEventListener('mouseleave', () => {
    mouse.x = -1000;
    mouse.y = -1000;
    if (card) card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
  });

  window.addEventListener('resize', () => {
    initBackground();
    initLogo();
  });

  document.fonts.ready.then(() => {
    initBackground();
    initLogo();
    animate();
  });

  // Tab Switching
  function switchToLogin() {
    document.getElementById('login-form').classList.remove('hidden');
    document.getElementById('register-form').classList.add('hidden');
    document.getElementById('footer-login').classList.remove('hidden');
    document.getElementById('footer-register').classList.add('hidden');
  }

  function switchToRegister() {
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('register-form').classList.remove('hidden');
    document.getElementById('footer-login').classList.add('hidden');
    document.getElementById('footer-register').classList.remove('hidden');
  }

  document.getElementById('tab-register-nav').addEventListener('click', switchToRegister);

  // Form Submissions
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    const users = JSON.parse(localStorage.getItem('secretsnap_users') || '[]');
    const user = users.find((entry) => entry.email === email && entry.password === password);
    
    if (!user) {
      alert('Invalid credentials');
      return;
    }
    
    user.isDuress = false;
    sessionStorage.setItem('secretsnap_current_user', JSON.stringify(user));
    window.location.href = '/chat';
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('reg-email').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirmPassword = document.getElementById('reg-confirm-password').value;

    if (password !== confirmPassword) {
      alert('Passwords do not match');
      return;
    }

    const users = JSON.parse(localStorage.getItem('secretsnap_users') || '[]');
    if (users.find((user) => user.email === email)) {
      alert('Email already registered');
      return;
    }

    users.push({ email, username, password });
    localStorage.setItem('secretsnap_users', JSON.stringify(users));
    alert('Account created successfully! Please sign in.');
    switchToLogin();
    document.getElementById('login-form').reset();
  });
</script>
