
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SecretSnap – Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-icon">🔒</div>
    <h2>SecretSnap</h2>
    <p class="auth-subtitle">Hide secret messages in images with steganography</p>

    <div class="auth-tabs">
      <button id="tab-login" class="auth-tab active">Login</button>
      <button id="tab-register" class="auth-tab">Register</button>
    </div>

    <form id="login-form" class="auth-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required>

      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" required>

      <button type="submit" class="auth-btn">Login</button>
    </form>

    <form id="register-form" class="auth-form hidden">
      <label>Email</label>
      <input type="email" id="reg-email" required>

      <label>Username</label>
      <input type="text" id="reg-username" required>

      <label>Password</label>
      <input type="password" id="reg-password" required>

      <label>Confirm Password</label>
      <input type="password" id="reg-confirm" required>

      <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <p class="auth-hint">Demo mode – accounts are stored in backend JSON storage.</p>
  </div>

  <script>
    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    tabLogin.onclick = () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
    };

    tabRegister.onclick = () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      registerForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    };

    async function postJson(url, body){
      const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      const data = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    registerForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('reg-email').value.trim().toLowerCase();
      const username = document.getElementById('reg-username').value.trim();
      const pw = document.getElementById('reg-password').value;
      const pw2 = document.getElementById('reg-confirm').value;

      if (pw !== pw2) {
        alert('Passwords do not match');
        return;
      }
      try {
        await postJson('/api/auth/register', {email, username, password: pw});
        alert('Account created! Please login.');
        tabLogin.click();
      } catch(err){
        alert(err.message);
      }
    };

    loginForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const pw = document.getElementById('login-password').value;
      try {
        const data = await postJson('/api/auth/login', {email, password: pw});
        sessionStorage.setItem('secretsnap_token', data.token);
        sessionStorage.setItem('secretsnap_current_user', JSON.stringify(data.user));
        window.location.href = '/chat';
      } catch(err){
        alert(err.message);
      }
    };
  </script>
</body>
</html>
